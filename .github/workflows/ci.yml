name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build check
        run: cargo check --workspace

      - name: Tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Vector conformance
        run: |
          cargo run -p reth2030-vectors -- \
            --fixtures-dir vectors/ethereum-state-tests/minimal \
            --baseline-scorecard vectors/baseline/scorecard.json \
            --baseline-snapshot vectors/baseline/snapshot.json \
            --out-dir artifacts/vectors

      - name: Upload vector artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vector-reports
          path: artifacts/vectors/
