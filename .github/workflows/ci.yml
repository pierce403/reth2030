name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components:
            - rustfmt
            - clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build check
        run: cargo check --workspace --locked

      - name: Tests
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  vector-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Vector conformance
        run: |
          cargo run -p reth2030-vectors --locked -- \
            --fixtures-dir vectors/ethereum-state-tests/minimal \
            --baseline-scorecard vectors/baseline/scorecard.json \
            --baseline-snapshot vectors/baseline/snapshot.json \
            --out-dir artifacts/vectors

      - name: Upload vector artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vector-reports
          path: artifacts/vectors/
          if-no-files-found: error
